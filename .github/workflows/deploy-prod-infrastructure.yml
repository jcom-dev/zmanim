name: Deploy Prod Infrastructure

# Deploys ALL AWS infrastructure (Network, Compute, DNS, CDN, Next.js)
# Triggers on infrastructure/ changes to main branch
# Uses OIDC authentication - no static AWS credentials required
# Region: eu-west-1 (Ireland)

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1
  NODE_VERSION: '22'

# Required for OIDC authentication
permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate CDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install infrastructure dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Synthesize CloudFormation templates
        run: npx cdk synth
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PROD_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: https://zmanim.shtetl.io
          CLERK_SECRET_KEY: ${{ secrets.PROD_CLERK_SECRET_KEY }}

      - name: Upload synthesized templates
        uses: actions/upload-artifact@v4
        with:
          name: cdk-out
          path: infrastructure/cdk.out
          retention-days: 7

  deploy:
    name: Deploy to AWS
    needs: validate
    runs-on: ubuntu-latest
    # Only deploy on tag push or manual trigger
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: infrastructure
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install infrastructure dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-cdk-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - name: Show expected changes
        run: npx cdk diff --all
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PROD_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: https://zmanim.shtetl.io
          CLERK_SECRET_KEY: ${{ secrets.PROD_CLERK_SECRET_KEY }}
        continue-on-error: true

      - name: CDK Synth
        run: npx cdk synth
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PROD_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: https://zmanim.shtetl.io
          CLERK_SECRET_KEY: ${{ secrets.PROD_CLERK_SECRET_KEY }}

      - name: Fix OpenNext symlinks
        run: |
          # OpenNext creates absolute symlinks to /tmp/ that break CDK publish
          for link in $(find cdk.out -type l 2>/dev/null); do
            target=$(readlink "$link")
            if [[ "$target" == /tmp/* ]]; then
              rm "$link"
            fi
          done

      - name: Deploy all stacks
        run: npx cdk deploy --all --require-approval never --app cdk.out
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PROD_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: https://zmanim.shtetl.io
          CLERK_SECRET_KEY: ${{ secrets.PROD_CLERK_SECRET_KEY }}

      - name: Output deployment status
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Authentication:** OIDC (no static credentials)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stacks Deployed:" >> $GITHUB_STEP_SUMMARY
          echo "- ZmanimGitHubOidc (OIDC provider + IAM role)" >> $GITHUB_STEP_SUMMARY
          echo "- ZmanimProdNetwork" >> $GITHUB_STEP_SUMMARY
          echo "- ZmanimProdCompute" >> $GITHUB_STEP_SUMMARY
          echo "- ZmanimProdCDN" >> $GITHUB_STEP_SUMMARY
          echo "- ZmanimProdDNS" >> $GITHUB_STEP_SUMMARY

# GitHub Secrets Required:
# - AWS_ACCOUNT_ID: AWS account ID (12 digits)
# - AWS_DEPLOY_ROLE_ARN: IAM role ARN for OIDC
# - PROD_CLERK_PUBLISHABLE_KEY: Clerk publishable key
# - PROD_CLERK_SECRET_KEY: Clerk secret key
#
# Trigger: Changes to infrastructure/ folder on main branch
# This workflow deploys ALL stacks including Next.js, so deploy-prod.yml
# should NOT run when infrastructure changes.
