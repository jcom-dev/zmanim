name: Build AMI with Packer

on:
  push:
    tags:
      - 'v*-ami'  # Trigger on tags like v1.0.0-ami
  workflow_dispatch:
    inputs:
      version:
        description: 'AMI version (e.g., v1.0.0)'
        required: true
        default: 'test-manual'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build-ami:
    name: Build Zmanim AMI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: api/go.sum

      - name: Build Go API binary for ARM64
        run: |
          cd api
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -o ../bin/zmanim-api \
            ./cmd/api
        env:
          CGO_ENABLED: 0

      - name: Verify binary
        run: |
          ls -lh bin/zmanim-api
          file bin/zmanim-api

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-cdk-deploy
          aws-region: eu-west-1

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: 'latest'

      - name: Initialize Packer
        run: |
          cd infrastructure/packer
          packer init .

      - name: Validate Packer template
        run: |
          cd infrastructure/packer
          packer validate .

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version from tag (e.g., v1.0.0-ami -> v1.0.0)
            VERSION="${GITHUB_REF_NAME%-ami}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building AMI version: ${VERSION}"

      - name: Build AMI with Packer
        run: |
          cd infrastructure/packer
          packer build \
            -var "version=${{ steps.version.outputs.version }}" \
            -var "api_binary_path=../../bin/zmanim-api" \
            .

      - name: Output AMI information
        run: |
          echo "AMI Build Complete!"
          echo "===================="
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Region: eu-west-1"
          echo "AMI Name: zmanim-${{ steps.version.outputs.version }}"
          echo ""
          echo "CDK will automatically find this AMI using:"
          echo "  ec2.MachineImage.lookup({ name: 'zmanim-*', owners: ['self'] })"
          echo ""
          cat infrastructure/packer/manifest.json

      - name: Cleanup old AMIs
        if: success()
        run: |
          echo "Cleaning up old AMIs (keeping latest 2)..."

          # Get all zmanim AMIs sorted by creation date (oldest first)
          AMIS=$(aws ec2 describe-images \
            --owners self \
            --filters "Name=name,Values=zmanim-*" \
            --query 'Images | sort_by(@, &CreationDate) | [*].[ImageId,Name,CreationDate]' \
            --output text \
            --region eu-west-1)

          # Count total AMIs
          TOTAL=$(echo "$AMIS" | wc -l)
          echo "Found $TOTAL zmanim AMIs"

          # Keep latest 2, delete the rest
          KEEP=2
          if [ "$TOTAL" -gt "$KEEP" ]; then
            DELETE_COUNT=$((TOTAL - KEEP))
            echo "Deleting $DELETE_COUNT old AMIs..."

            # Get AMI IDs to delete (oldest ones)
            OLD_AMIS=$(echo "$AMIS" | head -n $DELETE_COUNT | awk '{print $1}')

            for AMI_ID in $OLD_AMIS; do
              echo "Deregistering AMI: $AMI_ID"

              # Get associated snapshots before deregistering
              SNAPSHOTS=$(aws ec2 describe-images \
                --image-ids "$AMI_ID" \
                --query 'Images[0].BlockDeviceMappings[*].Ebs.SnapshotId' \
                --output text \
                --region eu-west-1 2>/dev/null || echo "")

              # Deregister the AMI
              aws ec2 deregister-image --image-id "$AMI_ID" --region eu-west-1 || true

              # Delete associated snapshots
              for SNAP_ID in $SNAPSHOTS; do
                if [ -n "$SNAP_ID" ] && [ "$SNAP_ID" != "None" ]; then
                  echo "  Deleting snapshot: $SNAP_ID"
                  aws ec2 delete-snapshot --snapshot-id "$SNAP_ID" --region eu-west-1 || true
                fi
              done
            done

            echo "Cleanup complete!"
          else
            echo "Only $TOTAL AMIs exist, nothing to clean up (keeping $KEEP)"
          fi

      - name: Upload Packer manifest
        uses: actions/upload-artifact@v4
        with:
          name: packer-manifest
          path: infrastructure/packer/manifest.json
          retention-days: 30
