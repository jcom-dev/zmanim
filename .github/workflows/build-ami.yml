name: Build AMI with Packer

on:
  push:
    tags:
      - 'v*-ami'  # Trigger on tags like v1.0.0-ami
  workflow_dispatch:
    inputs:
      version:
        description: 'AMI version (e.g., v1.0.0)'
        required: true
        default: 'test-manual'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build-ami:
    name: Build Zmanim AMI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: api/go.sum

      - name: Build Go API binary for ARM64
        run: |
          cd api
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -o ../bin/zmanim-api \
            ./cmd/api
        env:
          CGO_ENABLED: 0

      - name: Verify binary
        run: |
          ls -lh bin/zmanim-api
          file bin/zmanim-api

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-cdk-deploy
          aws-region: eu-west-1

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: 'latest'

      - name: Initialize Packer
        run: |
          cd infrastructure/packer
          packer init .

      - name: Validate Packer template
        run: |
          cd infrastructure/packer
          packer validate .

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version from tag (e.g., v1.0.0-ami -> v1.0.0)
            VERSION="${GITHUB_REF_NAME%-ami}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building AMI version: ${VERSION}"

      - name: Build AMI with Packer
        id: packer-build
        run: |
          cd infrastructure/packer
          packer build \
            -var "version=${{ steps.version.outputs.version }}" \
            -var "api_binary_path=../../bin/zmanim-api" \
            .

      - name: Extract AMI ID
        id: ami
        run: |
          # Packer outputs AMI ID in the format: eu-west-1: ami-xxxxx
          AMI_ID=$(grep -oP 'eu-west-1: \K(ami-[a-f0-9]+)' infrastructure/packer/manifest.json || echo "")
          if [ -z "$AMI_ID" ]; then
            echo "ERROR: Could not extract AMI ID from Packer output"
            exit 1
          fi
          echo "ami_id=${AMI_ID}" >> $GITHUB_OUTPUT
          echo "Built AMI: ${AMI_ID}"

      - name: Store AMI ID in SSM Parameter Store
        run: |
          aws ssm put-parameter \
            --name "/zmanim/prod/ami-id" \
            --type "String" \
            --value "${{ steps.ami.outputs.ami_id }}" \
            --overwrite \
            --region eu-west-1

          aws ssm put-parameter \
            --name "/zmanim/prod/ami-version" \
            --type "String" \
            --value "${{ steps.version.outputs.version }}" \
            --overwrite \
            --region eu-west-1

      - name: Tag AMI
        run: |
          aws ec2 create-tags \
            --resources "${{ steps.ami.outputs.ami_id }}" \
            --tags \
              Key=Version,Value=${{ steps.version.outputs.version }} \
              Key=GitCommit,Value=${{ github.sha }} \
              Key=GitRef,Value=${{ github.ref }} \
              Key=BuildDate,Value=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --region eu-west-1

      - name: Output AMI information
        run: |
          echo "AMI Build Complete!"
          echo "===================="
          echo "AMI ID: ${{ steps.ami.outputs.ami_id }}"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Region: eu-west-1"
          echo ""
          echo "SSM Parameters updated:"
          echo "  /zmanim/prod/ami-id"
          echo "  /zmanim/prod/ami-version"
          echo ""
          echo "To launch an instance:"
          echo "  aws ec2 run-instances --image-id ${{ steps.ami.outputs.ami_id }} ..."

      - name: Upload Packer manifest
        uses: actions/upload-artifact@v4
        with:
          name: packer-manifest
          path: infrastructure/packer/manifest.json
          retention-days: 30
