name: Build Prod AMI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'AMI version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build-ami:
    name: Build Zmanim AMI
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: api/go.sum

      - name: Build Go API binary for ARM64
        run: |
          cd api
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -o ../bin/zmanim-api \
            ./cmd/api
        env:
          CGO_ENABLED: 0

      - name: Verify binary
        run: |
          ls -lh bin/zmanim-api
          file bin/zmanim-api

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-packer-build
          aws-region: eu-west-1

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: 'latest'

      - name: Initialize Packer
        run: |
          cd infrastructure/packer
          packer init .

      - name: Validate Packer template
        run: |
          cd infrastructure/packer
          packer validate .

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version from tag (e.g., v1.0.0-ami -> v1.0.0)
            VERSION="${GITHUB_REF_NAME%-ami}"
          fi
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "Building AMI version: ${VERSION} (build: ${TIMESTAMP})"

      - name: Build AMI
        run: |
          cd infrastructure/packer
          packer build \
            -var "version=${{ steps.version.outputs.version }}" \
            -var "build_timestamp=${{ steps.version.outputs.timestamp }}" \
            -var "api_binary_path=../../bin/zmanim-api" \
            .

      - name: Rename AMI to final version
        id: rename
        run: |
          # Extract AMI ID from manifest
          AMI_ID=$(jq -r '.builds[-1].artifact_id | split(":")[1]' infrastructure/packer/manifest.json)
          echo "Built AMI: $AMI_ID"

          FINAL_NAME="zmanim-${{ steps.version.outputs.version }}"

          # Check if an AMI with the final name already exists
          OLD_AMI=$(aws ec2 describe-images \
            --owners self \
            --filters "Name=name,Values=${FINAL_NAME}" \
            --query 'Images[0].ImageId' \
            --output text \
            --region eu-west-1 2>/dev/null || echo "None")

          if [ -n "$OLD_AMI" ] && [ "$OLD_AMI" != "None" ]; then
            echo "Found existing AMI with name ${FINAL_NAME}: ${OLD_AMI}"
            echo "Deregistering old AMI..."

            # Get snapshots before deregistering
            OLD_SNAPSHOTS=$(aws ec2 describe-images \
              --image-ids "$OLD_AMI" \
              --query 'Images[0].BlockDeviceMappings[*].Ebs.SnapshotId' \
              --output text \
              --region eu-west-1 2>/dev/null || echo "")

            aws ec2 deregister-image --image-id "$OLD_AMI" --region eu-west-1

            # Delete old snapshots
            for SNAP_ID in $OLD_SNAPSHOTS; do
              if [ -n "$SNAP_ID" ] && [ "$SNAP_ID" != "None" ]; then
                echo "  Deleting old snapshot: $SNAP_ID"
                aws ec2 delete-snapshot --snapshot-id "$SNAP_ID" --region eu-west-1 || true
              fi
            done
          fi

          # Rename the new AMI by copying with the final name
          echo "Copying AMI to final name: ${FINAL_NAME}"
          NEW_AMI=$(aws ec2 copy-image \
            --source-image-id "$AMI_ID" \
            --source-region eu-west-1 \
            --region eu-west-1 \
            --name "${FINAL_NAME}" \
            --description "Zmanim ${{ steps.version.outputs.version }} - Built $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --query 'ImageId' \
            --output text)

          echo "New AMI created: $NEW_AMI"
          echo "final_ami_id=${NEW_AMI}" >> $GITHUB_OUTPUT

          # Wait for the copy to complete
          echo "Waiting for AMI copy to complete..."
          aws ec2 wait image-available --image-ids "$NEW_AMI" --region eu-west-1

          # Copy tags from original to new AMI
          aws ec2 create-tags --resources "$NEW_AMI" --region eu-west-1 --tags \
            Key=Name,Value="${FINAL_NAME}" \
            Key=Version,Value="${{ steps.version.outputs.version }}" \
            Key=BuildDate,Value="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            Key=Environment,Value=production \
            Key=ManagedBy,Value=Packer

          # Deregister the temporary build AMI
          echo "Cleaning up temporary AMI: $AMI_ID"
          TEMP_SNAPSHOTS=$(aws ec2 describe-images \
            --image-ids "$AMI_ID" \
            --query 'Images[0].BlockDeviceMappings[*].Ebs.SnapshotId' \
            --output text \
            --region eu-west-1 2>/dev/null || echo "")

          aws ec2 deregister-image --image-id "$AMI_ID" --region eu-west-1

          for SNAP_ID in $TEMP_SNAPSHOTS; do
            if [ -n "$SNAP_ID" ] && [ "$SNAP_ID" != "None" ]; then
              echo "  Deleting temp snapshot: $SNAP_ID"
              aws ec2 delete-snapshot --snapshot-id "$SNAP_ID" --region eu-west-1 || true
            fi
          done

          echo "Final AMI ready: $NEW_AMI (${FINAL_NAME})"

      - name: Store AMI ID in SSM Parameter Store
        run: |
          AMI_ID="${{ steps.rename.outputs.final_ami_id }}"

          echo "Storing AMI ID in SSM Parameter Store..."
          aws ssm put-parameter \
            --name "/zmanim/prod/ami-id" \
            --value "$AMI_ID" \
            --type "String" \
            --overwrite \
            --description "Latest Zmanim AMI ID (version ${{ steps.version.outputs.version }})" \
            --region eu-west-1

          echo "SSM Parameter /zmanim/prod/ami-id set to: $AMI_ID"

      - name: Output AMI information
        run: |
          echo "AMI Build Complete!"
          echo "===================="
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Region: eu-west-1"
          echo "AMI ID: ${{ steps.rename.outputs.final_ami_id }}"
          echo "AMI Name: zmanim-${{ steps.version.outputs.version }}"
          echo "SSM Parameter: /zmanim/prod/ami-id"
          echo ""
          echo "Terraform will read AMI ID from SSM at deploy time (no caching)"

      - name: Upload Packer manifest
        uses: actions/upload-artifact@v4
        with:
          name: packer-manifest
          path: infrastructure/packer/manifest.json
          retention-days: 30
